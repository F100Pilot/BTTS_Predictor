# Cloudflare Worker config for the Football-Data CORS proxy.
# Deploying with this name UPDATES the existing "btts-proxy" worker (it does not
# create a duplicate), as long as CLOUDFLARE_ACCOUNT_ID points at the same account.
name = "btts-proxy"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Cross-device sync storage (history & bets). KV namespace "btts-sync".
# The binding name MUST stay "SYNC" (the worker reads env.SYNC).
[[kv_namespaces]]
binding = "SYNC"
id = "bc8e21d26fd741ffb1344d1e8def402e"
