name: Preview (Cloudflare Pages)

# Builds every non-main branch and deploys it to Cloudflare Pages, giving each
# branch/PR its own live preview URL (GitHub Pages can only publish `main`).
# Reuses the same secrets as the Worker deploy:
#   - CLOUDFLARE_API_TOKEN  (needs "Cloudflare Pages — Edit" permission)
#   - CLOUDFLARE_ACCOUNT_ID
# If the token is absent, the deploy is skipped (no failure).
on:
  push:
    branches-ignore: ['main', 'master']
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    env:
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (root base — preview is served at the domain root)
        if: ${{ env.CF_TOKEN != '' }}
        run: npm run build
        env:
          VITE_BASE: /

      - name: Ensure Pages project exists
        if: ${{ env.CF_TOKEN != '' }}
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create btts-predictor --production-branch=main

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        if: ${{ env.CF_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=btts-predictor --branch=${{ github.ref_name }}

      - name: Comment preview URL on the PR
        if: ${{ env.CF_TOKEN != '' && steps.deploy.outputs.deployment-url != '' }}
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            const branch = context.ref.replace('refs/heads/', '');
            const marker = '<!-- cf-pages-preview -->';
            const body = `${marker}\n🔎 **Pré-visualização** desta branch (\`${branch}\`): ${url}\n\n_Atualiza a cada push. Servida pelo Cloudflare Pages._`;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
            });
            for (const pr of prs) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
              });
              const existing = comments.find((c) => c.body && c.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body,
                });
              }
            }

      - name: Summary
        if: ${{ env.CF_TOKEN != '' && steps.deploy.outputs.deployment-url != '' }}
        run: echo "Preview → ${{ steps.deploy.outputs.deployment-url }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Skipped notice
        if: ${{ env.CF_TOKEN == '' }}
        run: echo "CLOUDFLARE_API_TOKEN not set — skipping preview deploy."
