name: CI

# Runs the full quality gate (format, types, lint, tests, build) on every
# branch push and PR — BEFORE changes reach main. The Deploy workflow re-runs
# the same checks on main prior to publishing, so production stays protected.
on:
  push:
    branches-ignore: ['main', 'master']
  pull_request:
    branches: ['main', 'master']

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
