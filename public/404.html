<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <title>BTTS Analytics Pro</title>
    <script>
      // GitHub Pages SPA fallback. The app uses HashRouter, so we simply
      // redirect any deep path back to the app root.
      var seg = location.pathname.split('/').filter(Boolean);
      var base = seg.length > 0 ? '/' + seg[0] + '/' : '/';
      location.replace(base);
    </script>
  </head>

    A redirecionar…
  </body>
</html>
